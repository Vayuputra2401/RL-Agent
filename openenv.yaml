name: ap-clerk-env
version: "2.1.0"
description: >
  AI Accounts Payable Clerk — Three-Way Invoice Matching Environment.
  An agent must cross-reference vendor invoices against company Purchase Orders
  and warehouse Goods Receipt Notes, apply episode-specific policy rules, and
  decide whether to approve, partially approve, or reject each invoice for payment.
  Ten fully randomised tasks across easy / medium / hard difficulty levels.
  Features: randomised policy thresholds per episode, distractor documents,
  multi-step episodes (ESCALATE / QUERY_VENDOR), and harder graders.

author: "Pathikreet"
entrypoint: "uvicorn app.main:app --host 0.0.0.0 --port 7860"
base_url: "http://localhost:7860"
tags:
  - finance
  - enterprise
  - reasoning
  - arithmetic
  - policy-compliance
  - multi-step
  - openenv

tasks:
  - id: easy_perfect_match
    name: "Perfect Three-Way Match"
    difficulty: easy
    expected_decision: APPROVE_FULL
    target_score: 0.99

  - id: easy_no_po_found
    name: "No Purchase Order Found"
    difficulty: easy
    expected_decision: REJECT
    target_score: 0.99

  - id: medium_quantity_shortfall
    name: "Quantity Shortfall Reconciliation"
    difficulty: medium
    expected_decision: APPROVE_PARTIAL
    target_score: 0.99

  - id: medium_price_discrepancy
    name: "Unit Price Discrepancy"
    difficulty: medium
    expected_decision: REJECT
    target_score: 0.99

  - id: medium_split_delivery
    name: "Split Delivery Reconciliation"
    difficulty: medium
    expected_decision: APPROVE_FULL
    target_score: 0.99

  - id: medium_vendor_mismatch
    name: "Vendor Name Mismatch"
    difficulty: medium
    expected_decision: REJECT
    target_score: 0.99

  - id: hard_policy_violation
    name: "Policy Violation — Unauthorized Freight Charge"
    difficulty: hard
    expected_decision: REJECT
    target_score: 0.99

  - id: hard_duplicate_invoice
    name: "Duplicate Invoice Detection"
    difficulty: hard
    expected_decision: REJECT
    target_score: 0.99

  - id: hard_partial_po_match
    name: "Partial PO Coverage"
    difficulty: hard
    expected_decision: APPROVE_PARTIAL
    target_score: 0.99

  - id: hard_tax_discrepancy
    name: "Unauthorized Tax Charge"
    difficulty: hard
    expected_decision: REJECT
    target_score: 0.99

action_space:
  type: APAction
  fields:
    decision:
      type: enum
      values: [APPROVE_FULL, APPROVE_PARTIAL, REJECT, QUERY_VENDOR, ESCALATE, HOLD]
      terminal: [APPROVE_FULL, APPROVE_PARTIAL, REJECT]
      intermediate: [QUERY_VENDOR, ESCALATE, HOLD]
    approved_amount: { type: float, range: [0.0, inf] }
    reason_code:
      type: enum
      values: [MATCH_CONFIRMED, QUANTITY_MISMATCH, PRICE_DISCREPANCY,
               POLICY_VIOLATION, NO_PO_FOUND, DUPLICATE_INVOICE,
               VENDOR_MISMATCH, TAX_DISCREPANCY,
               PENDING_CLARIFICATION, MANAGER_REVIEW]
    explanation: { type: string, min_length: 10, max_length: 600 }

observation_space:
  type: APObservation
  fields:
    task_id:          string
    task_name:        string
    task_description: string
    invoice:          Invoice
    purchase_orders:  List[PurchaseOrder]
    goods_receipts:   List[GoodsReceipt]
    paid_invoice_ids: List[string]
    company_policy:   string
    step_count:       int
    max_steps:        int
    freight_cap:      float
    price_tolerance:  float
    action_history:   List[dict]
    context_notes:    List[string]

reward_range: [0.01, 0.99]
reward_type: APReward
reward_partial_credit: true
episode_termination: terminal_action_or_max_steps
multi_step_support: true
randomised: true
seed_support: true

endpoints:
  reset:  "POST /reset"
  step:   "POST /step"
  state:  "GET  /state"
  tasks:  "GET  /tasks"
  health: "GET  /health"
